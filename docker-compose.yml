services:
  # Base de données PostgreSQL
  db:
    image: postgres:18-alpine
    container_name: dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nostrada
      POSTGRES_PASSWORD: nostrada
      POSTGRES_DB: nostrada
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostrada -d nostrada"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend (Express + Prisma)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dev_api
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "51212:51212"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://nostrada:nostrada@db:5432/nostrada?schema=public
      ALLOWED_ORIGIN: http://localhost:3000
      JWT_SECRET: ***REMOVED***
      FOOTBALL_DATA_API_TOKEN: ***REMOVED***
    volumes:
      - ./api:/app
      - /app/node_modules
      # - /app/.next
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run sync && npm run db:seed && npm run dev"

  # Client Frontend (Next.js)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: nextjs-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_API_URL_CLIENT: http://localhost:4000
      NODE_ENV: development
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - app_network
    depends_on:
      - api
    command: npm run dev

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: