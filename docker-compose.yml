services:
  # Base de données PostgreSQL
  db:
    image: postgres:18-alpine
    container_name: dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostrada -d nostrada"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend (Express + Prisma)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dev_api
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "51212:51212"
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      FOOTBALL_DATA_API_TOKEN: ${FOOTBALL_DATA_API_TOKEN}
      ENV: env
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run sync && npm run db:seed && npm run docker:dev"

  # Client Frontend (Next.js)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: nextjs-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_API_URL_CLIENT: http://localhost:4000
      NODE_ENV: development
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next
    networks:
      - app_network
    depends_on:
      - api
    command: npm run dev

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  api_node_modules:
  client_node_modules:
  client_next: